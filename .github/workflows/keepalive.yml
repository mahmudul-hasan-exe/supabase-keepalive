name: Supabase Keep Alive
on:
  schedule:
    - cron: '0 10 */5 * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EduSolve
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL_EDUSOLVE }}/rest/v1/" -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}" -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "EDUSOLVE_STATUS=✅ ACTIVE" >> $GITHUB_ENV
            echo "ACTIVE_COUNT=1" >> $GITHUB_ENV
            echo "FAILED_COUNT=0" >> $GITHUB_ENV
          else
            echo "EDUSOLVE_STATUS=❌ FAILED" >> $GITHUB_ENV
            echo "ACTIVE_COUNT=0" >> $GITHUB_ENV
            echo "FAILED_COUNT=1" >> $GITHUB_ENV
          fi
      - name: Send Telegram Notification
        run: |
          ACTIVE=${{ env.ACTIVE_COUNT }}
          FAILED=${{ env.FAILED_COUNT }}
          RATE=$(( ACTIVE * 100 / 1 ))
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🚀 <b>SUPABASE MONITOR</b>%0A%0A🗓 $(date '+%B %d, %Y')  |  $(date '+%H:%M UTC')%0A%0A📦 <b>PROJECT STATUS</b>%0A%0A📌 EduSolve     ${{ env.EDUSOLVE_STATUS }}%0A%0A📊 <b>SUMMARY</b>%0A%0A✅ Total Active   :  ${ACTIVE}%0A❌ Total Failed   :  ${FAILED}%0A📈 Success Rate   :  ${RATE}%%%0A%0A🔁 Next Ping : 5 days later%0A⚡ Powered by GitHub Actions"
