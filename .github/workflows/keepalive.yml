name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 10 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EduSolve
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL_EDUSOLVE }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "EDUSOLVE_STATUS=тЬЕ ACTIVE" >> $GITHUB_ENVname: Supabase Keep Alive

on:
  schedule:
    - cron: '0 10 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EduSolve
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL_EDUSOLVE }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_EDUSOLVE }}")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "EDUSOLVE_STATUS=тЬЕ ACTIVE" >> $GITHUB_ENV
            echo "ACTIVE_COUNT=1" >> $GITHUB_ENV
            echo "FAILED_COUNT=0" >> $GITHUB_ENV
          else
            echo "EDUSOLVE_STATUS=тЭМ FAILED" >> $GITHUB_ENV
            echo "ACTIVE_COUNT=0" >> $GITHUB_ENV
            echo "FAILED_COUNT=1" >> $GITHUB_ENV
          fi

      - name: Send Telegram Notification
        run: |
          ACTIVE=${{ env.ACTIVE_COUNT }}
          FAILED=${{ env.FAILED_COUNT }}
          TOTAL=1
          RATE=$(( ACTIVE * 100 / TOTAL ))
          DATE=$(date '+%B %d, %Y')
          TIME=$(date '+%H:%M UTC')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="ЁЯЪА <b>SUPABASE MONITOR</b>%0A%0AЁЯЧУ ${DATE}  |  ${TIME}%0A%0AЁЯУж <b>PROJECT STATUS</b>%0A%0AЁЯУМ EduSolve     ${{ env.EDUSOLVE_STATUS }}%0A%0AЁЯУК <b>SUMMARY</b>%0A%0AтЬЕ Total Active   :  ${ACTIVE}%0AтЭМ Total Failed   :  ${FAILED}%0AЁЯУИ Success Rate   :  ${RATE}%%%0A%0AЁЯФБ Next Ping : 5 days later%0AтЪб Powered by GitHub Actions"
            echo "ACTIVE_COUNT=1" >> $GITHUB_ENV
            echo "FAILED_COUNT=0" >> $GITHUB_ENV
          else
            echo "EDUSOLVE_STATUS=тЭМ FAILED" >> $GITHUB_ENV
            echo "ACTIVE_COUNT=0" >> $GITHUB_ENV
            echo "FAILED_COUNT=1" >> $GITHUB_ENV
          fi

      - name: Send Telegram Notification
        run: |
          ACTIVE=${{ env.ACTIVE_COUNT }}
          FAILED=${{ env.FAILED_COUNT }}
          TOTAL=1
          RATE=$(( ACTIVE * 100 / TOTAL ))
          DATE=$(date '+%B %d, %Y')
          TIME=$(date '+%H:%M UTC')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="ЁЯЪА <b>SUPABASE MONITOR</b>%0A%0AЁЯЧУ ${DATE}  |  ${TIME}%0A%0AЁЯУж <b>PROJECT STATUS</b>%0A%0AЁЯУМ EduSolve     ${{ env.EDUSOLVE_STATUS }}%0A%0AЁЯУК <b>SUMMARY</b>%0A%0AтЬЕ Total Active   :  ${ACTIVE}%0AтЭМ Total Failed   :  ${FAILED}%0AЁЯУИ Success Rate   :  ${RATE}%%%0A%0AЁЯФБ Next Ping : 5 days later%0AтЪб Powered by GitHub Actions"
